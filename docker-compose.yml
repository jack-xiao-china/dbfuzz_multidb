services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    profiles: [mysql, txcheck, cross, eet]

  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: your_password
      MARIADB_DATABASE: testdb
    ports:
      - "3307:3306"
    profiles: [mariadb, txcheck]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    profiles: [postgres, eet]

  tidb:
    image: pingcap/tidb:latest
    ports:
      - "4000:4000"
    profiles: [tidb, txcheck, eet]

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    profiles: [clickhouse, eet]
